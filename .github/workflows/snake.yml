name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: YUSEF-RAMY
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=cyan&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push to output
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
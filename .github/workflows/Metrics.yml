name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: YUSEF-RAMY
          template: classic
          config_timezone: Africa/Cairo
          
          # بنعرض فقط الترويسة الأساسية (اسمك ومتابعيك)
          base: header

          # 1️⃣ تفعيل إضافة الاستمرارية والـ Streak (التقويم السنوي الأخضر اللي بيبين كل يوم عملت فيه إيه)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year # بيعرضلك إحصائيات سنة كاملة من الاستمرار والكود

          # 2️⃣ تفعيل إضافة الأسطر المكتوبة (عشان تبين حجم الكود الجامد اللي بتكتبه)
          plugin_lines: yes

          # 3️⃣ إظهار لغات البرمجة القوية بتاعتك فقط
          plugin_languages: yes
          plugin_languages_ignored: jupyter notebook, html, css # حذف جوبيتر والـ ويب الأساسي تماماً
          plugin_languages_details: bytes-size, percentage # بيبين النسبة المئوية لكل لغة وحجمها

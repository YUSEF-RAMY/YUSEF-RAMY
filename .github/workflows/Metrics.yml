name: Metrics
on:
  # بيحدث الإحصائيات تلقائياً كل 12 ساعة
  schedule: [{cron: "0 */12 * * *"}]
  # بيسمح لك تشغله يدوي بأي وقت
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # التوكن الافتراضي لتشغيل الأكشن
          token: ${{ secrets.GITHUB_TOKEN }}

          # الإعدادات وتصفية لغة Jupyter
          user: YUSEF-RAMY
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Cairo
          
          # هنا بنقول للأكشن يتجاهل الجوبيتر تماماً وميحسبوش
          ignored_languages: jupyter notebook, html, css

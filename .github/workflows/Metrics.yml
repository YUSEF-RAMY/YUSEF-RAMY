name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: YUSEF-RAMY
          template: classic
          config_timezone: Africa/Cairo
          
          # هنا بنختار الحاجات القوية بس (الهيدر، النشاط، والـ ليدر بورد الأخضر)
          base: header, activity, community
          
          # إخفاء الـ الأصفار والحاجات الضعيفة من قسم الـ activity
          base_activity: commits, pullrequests
          
          # إخفاء الـ الأصفار من قسم الـ community (هنظهر المتابعين والمستودعات المساهم فيها بس)
          base_community: followers, repositories
          
          # تجاهل لغات الجوبيتر والـ CSS عشان يفضل البروفايل مقتصر على لغاتك الأساسية
          ignored_languages: jupyter notebook, html, css

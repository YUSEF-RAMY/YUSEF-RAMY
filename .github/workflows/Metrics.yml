name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: YUSEF-RAMY
          template: classic
          config_timezone: Africa/Cairo
          
          # هنا بنعرض فقط الترويسة الأساسية والـ ليدر بورد الأخضر
          base: header

          # تفعيل إضافة الأسطر والإحصائيات المفصلة الذكية
          plugin_lines: yes
          
          # إظهار الإيرادات والمتابعين والنجوم بشكل مقتضب جداً ونظيف
          base_repositories: starred
          
          # تجاهل لغات الجوبيتر تماماً من أي حسابات فرعية
          ignored_languages: jupyter notebook, html, css
